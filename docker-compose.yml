services:
  redis:
    image: redis:7.2-alpine
    container_name: party_app_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [app_net]

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: party_app_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Inside the compose network, reach Redis by service name
      REDIS_HOST: redis
    ports:
      - '3000:3000'
    depends_on:
      redis:
        condition: service_healthy
    networks: [app_net]

volumes:
  redis_data:

networks:
  app_net:
    driver: bridge
