services:
  redis:
    image: redis:7.2-alpine
    container_name: party_app_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [app_net]

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: party_app_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Inside the compose network, reach Redis by service name
      REDIS_HOST: redis
      # Override the .env path with the in-container mount target.
      # The host file lives at the repo root and is gitignored —
      # see the volume mount below. The JSON env var is left empty
      # so the path-based loader takes precedence.
      FIREBASE_SERVICE_ACCOUNT_PATH: /run/secrets/firebase-service-account.json
    volumes:
      # Mount the Firebase service-account JSON read-only at a
      # known path inside the container. Host file lives in
      # backend/secrets/ which is gitignored — never commit creds.
      - ./secrets/firebase-service-account.json:/run/secrets/firebase-service-account.json:ro
    ports:
      - '3000:3000'
    depends_on:
      redis:
        condition: service_healthy
    networks: [app_net]

volumes:
  redis_data:

networks:
  app_net:
    driver: bridge
